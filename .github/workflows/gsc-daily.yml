name: gsc-daily

on:
  schedule:
    # Runs daily at 03:10 UTC. Adjust to your preferred timezone.
    - cron: "10 3 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/gsc/daily
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL secret not set; skipping."
            exit 0
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set; skipping."
            exit 0
          fi

          curl -sS -f -X POST "$API_BASE_URL/api/cron/gsc/daily" \
            -H "content-type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{"pagePathPrefix":"/healthinfo/"}'
